<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velart</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-white flex flex-col items-center justify-center min-h-screen">

  <div class="text-center animate-fade-in">
    <img src="img/logo_velartbgw.png" class="mx-auto w-80 mb-8 drop-shadow-2xl">

    <h1 class="text-black font-bold text-3xl">Bienvenido a Velart</h1>
    <p class="text-gray-600 mt-2">Sistema de gestión de ventas y gastos</p>

    <a href="login.html" class="mt-6 inline-block bg-yellow-400 hover:bg-yellow-500 text-black px-6 py-3 rounded-xl shadow">
      Iniciar sesión
    </a>
  </div>

  <footer class="absolute bottom-4 text-sm text-gray-500">
    © 2025 Velart | Desarrollado para el SENA
  </footer>

  <style>
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fade-in 1.2s ease-out;
    }
  </style>

</body>
</html>
