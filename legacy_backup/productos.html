<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Productos - Velart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <style> body{background:#ffe4e6} </style>
</head>
<body>

  <header class="bg-pink-600 text-white p-4 flex justify-between items-center">
    <div class="flex items-center gap-3"><img src="img/logo_velart.png" class="w-8 h-8"><h1 class="font-bold">Velart</h1></div>
    <button id="btnCerrar" class="bg-pink-800 px-3 py-1 rounded">Cerrar sesión</button>
  </header>

  <div class="flex">
    <aside class="w-64 bg-pink-500 text-white min-h-screen p-4">
      <ul class="space-y-3 text-lg">
        <li><a href="dashboard.html" class="block p-2 rounded">Dashboard</a></li>
        <li><a href="ventas.html" class="block p-2 rounded">Ventas</a></li>
        <li><a href="productos.html" class="block menu-activo p-2 rounded">Productos</a></li>
        <li><a href="inventario.html" class="block p-2 rounded">Inventario</a></li>
        <li><a href="cierre.html" class="block p-2 rounded">Cierres</a></li>
      </ul>
    </aside>

    <main class="flex-1 p-6">
      <h2 class="text-2xl font-bold text-pink-700 mb-4">Productos</h2>

      <div class="card mb-6">
        <h3 class="font-semibold mb-3">Agregar / editar producto</h3>
        <input id="nombreProd" placeholder="Nombre producto" class="w-full mb-2 input" />
        <input id="precioProd" placeholder="Precio" type="number" class="w-full mb-2 input" />
        <button id="btnGuardarProd" class="btn">Guardar producto</button>
      </div>

      <div class="card">
        <h3 class="font-semibold mb-3">Lista de productos</h3>
        <table class="table w-full text-center">
          <thead class="bg-pink-600 text-white"><tr><th>Producto</th><th>Precio</th><th>Acciones</th></tr></thead>
          <tbody id="listaProductos"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/utils.js"></script>

  <script>
    protegerPagina();
    const u = usuarioActual(); 
    if(u) document.getElementById('btnCerrar').addEventListener('click', cerrarSesion);

    function renderProductos(){
      const tbody = document.getElementById('listaProductos');
      tbody.innerHTML = '';
      obtenerProductos().forEach((p, i)=>{
        tbody.innerHTML += `<tr>
          <td>${p.nombre}</td>
          <td>$ ${p.precio.toLocaleString()}</td>
          <td>
            <button onclick="editarProducto(${i})" class="btn" style="background:#f97316">Editar</button>
            <button onclick="eliminarProducto(${i})" class="btn" style="background:#ef4444">Eliminar</button>
          </td>
        </tr>`;
      });
    }

    document.getElementById('btnGuardarProd').addEventListener('click', ()=>{
      const n = document.getElementById('nombreProd').value.trim();
      const p = parseFloat(document.getElementById('precioProd').value);
      if(!n || !p) return alert('Complete nombre y precio');
      agregarProducto(n,p);
      document.getElementById('nombreProd').value=''; document.getElementById('precioProd').value='';
      renderProductos();
    });

    renderProductos();
  </script>
</body>
</html>
