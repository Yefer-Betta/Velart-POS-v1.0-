<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Inventario - Velart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <style> body{background:#ffe4e6} </style>
</head>
<body>
  <header class="bg-pink-600 text-white p-4 flex justify-between items-center">
    <div class="flex items-center gap-3"><img src="img/logo_velart.png" class="w-8 h-8"><h1 class="font-bold">Velart</h1></div>
    <button id="btnCerrar" class="bg-pink-800 px-3 py-1 rounded">Cerrar sesión</button>
  </header>

  <div class="flex">
    <aside class="w-64 bg-pink-500 text-white min-h-screen p-4">
      <ul class="space-y-3 text-lg">
        <li><a href="dashboard.html" class="block p-2 rounded">Dashboard</a></li>
        <li><a href="productos.html" class="block p-2 rounded">Productos</a></li>
        <li><a href="inventario.html" class="block menu-activo p-2 rounded">Inventario</a></li>
      </ul>
    </aside>

    <main class="flex-1 p-6">
      <h2 class="text-2xl font-bold text-pink-700 mb-4">Inventario</h2>

      <div class="card mb-6">
        <h3 class="font-semibold mb-3">Agregar stock</h3>
        <select id="selProducto" class="w-full mb-2 input"></select>
        <input id="cantidadInv" type="number" placeholder="Cantidad" class="w-full mb-2 input" />
        <button id="btnAgregarInv" class="btn">Agregar al inventario</button>
      </div>

      <div class="card">
        <h3 class="font-semibold mb-3">Registro de inventario</h3>
        <table class="table w-full text-center">
          <thead class="bg-pink-600 text-white"><tr><th>Producto</th><th>Cantidad</th><th>Fecha</th></tr></thead>
          <tbody id="tablaInventario"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/productos.js"></script>
  <script src="js/inventario.js"></script>
  <script src="js/utils.js"></script>

  <script>
    protegerPagina();
    document.getElementById('btnCerrar').addEventListener('click', cerrarSesion);

    function renderSelect(){
      const sel = document.getElementById('selProducto');
      sel.innerHTML = '';
      obtenerProductos().forEach(p => sel.innerHTML += `<option value="${p.nombre}">${p.nombre}</option>`);
    }

    function renderInv(){
      const t = document.getElementById('tablaInventario');
      t.innerHTML = '';
      obtenerInventario().forEach(i=>{
        t.innerHTML += `<tr><td>${i.nombre}</td><td>${i.cantidad}</td><td>${i.fecha}</td></tr>`;
      });
    }

    document.getElementById('btnAgregarInv').addEventListener('click', ()=>{
      const prod = document.getElementById('selProducto').value;
      const qty = parseInt(document.getElementById('cantidadInv').value);
      if(!prod || !qty) return alert('Complete campos');
      agregarInventario(prod, qty);
      document.getElementById('cantidadInv').value='';
      renderInv();
    });

    renderSelect(); renderInv();
  </script>
</body>
</html>
