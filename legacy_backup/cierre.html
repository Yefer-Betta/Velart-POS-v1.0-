<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cierres - Velart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <style> body{background:#ffe4e6} </style>
</head>
<body>
  <header class="bg-pink-600 text-white p-4 flex justify-between items-center">
    <div class="flex items-center gap-3"><img src="img/logo_velart.png" class="w-8 h-8"><h1 class="font-bold">Velart</h1></div>
    <button id="btnCerrar" class="bg-pink-800 px-3 py-1 rounded">Cerrar sesión</button>
  </header>

  <div class="flex">
    <aside class="w-64 bg-pink-500 text-white min-h-screen p-4">
      <ul class="space-y-3 text-lg">
        <li><a href="dashboard.html" class="block p-2 rounded">Dashboard</a></li>
        <li><a href="cierre.html" class="block menu-activo p-2 rounded">Cierres</a></li>
        <li><a href="reportes.html" class="block p-2 rounded">Reportes</a></li>
      </ul>
    </aside>

    <main class="flex-1 p-6">
      <h2 class="text-2xl font-bold text-pink-700 mb-4">Cierre de caja</h2>

      <div class="card mb-6">
        <h3 class="font-semibold">Resumen actual</h3>
        <p id="resVentas">Ventas: $0</p>
        <p id="resGastos">Gastos: $0</p>
        <p id="resBalance">Balance: $0</p>
        <button id="btnGenerar" class="btn mt-4">Generar cierre</button>
      </div>

      <div class="card">
        <h3 class="font-semibold mb-3">Historial de cierres</h3>
        <table class="table w-full text-center">
          <thead class="bg-pink-600 text-white">
            <tr><th>Fecha</th><th>Ventas</th><th>Gastos</th><th>Balance</th></tr>
          </thead>
          <tbody id="tablaCierres"></tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Cargar auth y el app unificado -->
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/ventas.js"></script>
  <script src="js/gastos.js"></script>
  <script src="js/cierre.js"></script>
  <script src="js/utils.js"></script>

  <script>
    protegerPagina();
    document.getElementById('btnCerrar').addEventListener('click', cerrarSesion);

    function renderCierres(){
      const t = document.getElementById('tablaCierres');
      t.innerHTML = '';
      const hist = obtenerCierres();
      hist.forEach(c=> t.innerHTML += `<tr><td>${c.fecha}</td><td>$${c.ventas.toLocaleString()}</td><td>$${c.gastos.toLocaleString()}</td><td>$${c.balance.toLocaleString()}</td></tr>`);
    }

    function actualizarResumen(){
      document.getElementById('resVentas').textContent = 'Ventas: $' + totalVentas().toLocaleString();
      document.getElementById('resGastos').textContent = 'Gastos: $' + totalGastos().toLocaleString();
      document.getElementById('resBalance').textContent = 'Balance: $' + (totalVentas()-totalGastos()).toLocaleString();
    }

    document.getElementById('btnGenerar').addEventListener('click', ()=>{
      const cierre = generarCierre();
      alert('Cierre guardado: ' + cierre.fecha);
      renderCierres();
      actualizarResumen();
    });

    renderCierres(); actualizarResumen();
  </script>
</body>
</html>
